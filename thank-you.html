<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Thank you for your message!" />
  <title>Message Sent — Thank You</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
    .thank-you-container { text-align: center; max-width: 500px; }
    .thank-you-icon { width: 80px; height: 80px; margin: 0 auto 2rem; color: var(--accent); }
    .thank-you-title { font-family: var(--font-serif); font-size: 2.5rem; margin-bottom: 1rem; }
    .thank-you-text { color: var(--text-2); font-size: 1rem; line-height: 1.6; margin-bottom: 2rem; }
    .thank-you-btn { display: inline-block; padding: 1rem 2rem; background: var(--accent); color: var(--bg); border-radius: 0.5rem; text-decoration: none; font-weight: 500; transition: all 0.3s; }
    .thank-you-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(232, 213, 176, 0.2); }
  </style>
</head>
<body>
  <div class="thank-you-container">
    <svg class="thank-you-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="20 6 9 17 4 12"></polyline>
    </svg>
    <h1 class="thank-you-title">Message Sent!</h1>
    <p class="thank-you-text">Thank you for reaching out. I've received your message and will get back to you as soon as possible.</p>
    <a href="index.html" class="thank-you-btn">← Back to Portfolio</a>
  </div>
</body>
</html>
